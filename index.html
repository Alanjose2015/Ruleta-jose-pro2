<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta PRO</title>
    <style>
        :root { --primary: #25D366; --accent: #ff0055; --gold: #f1c40f; } 
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; gap: 15px; } 
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 360px; } 
        .wheel-container { position: relative; width: 320px; height: 320px; border-radius: 50%; box-shadow: 0 0 30px rgba(37,211,102,.2); } 
        .wheel-center-img { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:90px; height:90px; border-radius:50%; border:4px solid var(--gold); z-index:20; background-image:url('avatar.png'); background-size:cover; background-position:center; box-shadow:0 0 20px rgba(0,0,0,.8); }
        .indicator { position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:28px solid var(--accent); z-index:25; }
        .wheel { width:100%; height:100%; border-radius:50%; border:8px solid var(--gold); position:relative; overflow:hidden; transition:transform 5s cubic-bezier(.1,0,.1,1); background:#16213e; }
        .number { position:absolute; width:100%; height:100%; text-align:center; font-weight:bold; padding-top:8px; box-sizing:border-box; transform-origin:center center; font-size:13px; }
        .apuesta { display:flex; gap:8px; align-items:center; margin:10px 0; flex-wrap:wrap; justify-content:center; }
        .apuesta input { width:70px; padding:8px; font-size:16px; border-radius:6px; border:2px solid var(--gold); background:#222; color:white; text-align:center; }
        .apuesta button { padding:8px 14px; font-size:15px; background:var(--gold); border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
        .history-panel { width:100%; max-width:320px; max-height:350px; background:rgba(255,255,255,.05); border-radius:16px; padding:15px; border:1px solid var(--primary); display:flex; flex-direction:column; }
        #historyList { list-style:none; padding:0; overflow-y:auto; flex-grow:1; margin:5px 0; }
        .ws-card { background:var(--primary); color:white; text-decoration:none; display:flex; justify-content:space-between; margin-bottom:8px; padding:12px; border-radius:10px; font-weight:bold; font-size:14px; }
        button#spinBtn { padding:14px 35px; font-size:17px; cursor:pointer; background:var(--gold); border:none; border-radius:50px; font-weight:bold; box-shadow:0 4px 12px rgba(241,196,15,.3); margin-top:8px; }
        button:disabled { background:#444; color:#888; cursor:not-allowed; }
        h1,h2 { margin:0; color:var(--gold); text-align:center; text-transform:uppercase; font-size:1.3rem; }
        #mensaje { font-size:1.2rem; font-weight:bold; margin:8px 0; text-align:center; min-height:1.6rem; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>RULETA PRO</h1>
        <div class="wheel-container">
            <div class="indicator"></div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center-img"></div>
        </div>

        <!-- 🎯 NUEVO: ELEGIR NÚMERO ANTES DE GIRAR -->
        <div class="apuesta">
            <label>Tu número (1-36):</label>
            <input type="number" id="numElegido" min="1" max="36" placeholder="ej:7">
        </div>

        <div id="mensaje">Elige tu número y gira</div>
        <button id="spinBtn" onclick="girar()">¡PROBAR SUERTE!</button>
    </div>

    <div class="history-panel">
        <h2>RESULTADOS</h2>
        <ul id="historyList"></ul>
    </div>

<script>
const wheel=document.getElementById('wheel'), historyList=document.getElementById('historyList'), spinBtn=document.getElementById('spinBtn'), mensaje=document.getElementById('mensaje');
const miTelefono="5493815727447";
const prohibidos=[13,21]; // tus números bloqueados
let currentRotation=0;
const sonidoRuleta=new Audio('https://assets.mixkit.co/sfx/preview/mixkit-roulette-spin-1359.mp3');

window.onload=()=>{
    for(let i=1;i<=36;i++){
        const d=document.createElement('div');
        d.className='number'; d.textContent=i;
        d.style.transform=`rotate(${(i-1)*10}deg)`;
        d.style.color=i%2===0?'#fff':'#25D366';
        wheel.appendChild(d);
    }
    if(localStorage.getItem('ya_jugo_pro')) bloquearBoton();
    renderizar();
};

function girar(){
    if(localStorage.getItem('ya_jugo_pro'))return;
    const elegido=parseInt(document.getElementById('numElegido').value);
    if(!elegido || elegido<1 || elegido>36){ mensaje.textContent="⚠️ Pon un número entre 1 y 36"; mensaje.style.color="#ff4444"; return; }
    if(prohibidos.includes(elegido)){ mensaje.textContent="❌ Ese número está bloqueado"; mensaje.style.color="#ff4444"; return; }

    sonidoRuleta.load(); sonidoRuleta.play().catch(e=>{});
    spinBtn.disabled=true; mensaje.textContent="Girando..."; mensaje.style.color="white";

    const extra=Math.floor(Math.random()*360);
    currentRotation+=1800+extra;
    wheel.style.transform=`rotate(${currentRotation}deg)`;

    setTimeout(()=>{
        sonidoRuleta.pause();
        let ganador;
        do{
            const angulo=(360-(currentRotation%360))%360;
            ganador=Math.floor(angulo/10)+1;
            if(prohibidos.includes(ganador)) currentRotation+=10, wheel.style.transform=`rotate(${currentRotation}deg)`;
        }while(prohibidos.includes(ganador));

        // ✅ COMPARA LO QUE ELIJIÓ CON LO QUE SALIÓ
        if(ganador===elegido){
            mensaje.textContent=`✅ ¡GANASTE! Elegiste ${elegido} → Salió ${ganador}`;
            mensaje.style.color="#25D366";
        }else{
            mensaje.textContent=`❌ PERDISTE. Elegiste ${elegido} → Salió ${ganador}`;
            mensaje.style.color="#ff4444";
        }

        guardar(ganador);
        localStorage.setItem('ya_jugo_pro','true');
        bloquearBoton();
    },5000);
}

function bloquearBoton(){ spinBtn.disabled=true; spinBtn.textContent="SÓLO 1 INTENTO"; }

function guardar(num){
    const datos=JSON.parse(localStorage.getItem('ruleta_v5')||'[]');
    datos.unshift({numero:num,hora:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    localStorage.setItem('ruleta_v5',JSON.stringify(datos));
    renderizar();
}

function renderizar(){
    const datos=JSON.parse(localStorage.getItem('ruleta_v5')||'[]');
    historyList.innerHTML='';
    datos.forEach(i=>{
        const a=document.createElement('a');
        a.className='ws-card';
        a.href=`https://wa.me/${miTelefono}?text=Ganador+PRO:+%23${i.numero}`;
        a.target='_blank';
        a.innerHTML=`<span>#${i.numero}</span> <span>${i.hora} 📲</span>`;
        historyList.appendChild(a);
    });
}
</script>
</body>
</html>
