<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta PRO</title>
    <style>
        :root { --primary: #25D366; --accent: #ff0055; --gold: #f1c40f; } 
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; gap: 20px; } 
        
        .main-container { display: flex; flex-direction: column; align-items: center; } 
        .wheel-container { position: relative; width: 350px; height: 350px; border-radius: 50%; box-shadow: 0 0 30px rgba(37, 211, 102, 0.2); } 

        .wheel-center-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            z-index: 20;
            background-image: url('avatar.png');
            background-size: cover;
            background-position: center 20%; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .indicator { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--accent); z-index: 30; } 
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--gold); position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); background: #16213e; } 
        .number { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: bold; padding-top: 10px; box-sizing: border-box; transform-origin: center center; font-size: 14px; } 
        
        .history-panel { width: 100%; max-width: 320px; height: 400px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px; border: 1px solid var(--primary); display: flex; flex-direction: column; } 
        #historyList { list-style: none; padding: 0; overflow-y: auto; flex-grow: 1; } 
        
        .ws-card { background: var(--primary); color: white; text-decoration: none; display: flex; justify-content: space-between; margin-bottom: 10px; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        
        button#spinBtn { margin-top: 20px; padding: 15px 40px; font-size: 18px; cursor: pointer; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3); } 
        button#spinBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        h1, h2 { margin: 0; color: var(--gold); text-align: center; text-transform: uppercase; }
        #mensaje { font-size:1.2rem; font-weight:bold; margin:10px 0; }
        @media (min-width: 768px) { body { flex-direction: row; gap: 50px; } }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>RULETA PRO</h1>
        <div class="wheel-container">
            <div class="indicator"></div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center-img"></div>
        </div>
        <div id="mensaje">¡Gira para jugar!</div>
        <button id="spinBtn" onclick="girar()">¡PROBAR SUERTE!</button>
    </div>

    <div class="history-panel">
        <h2>RESULTADOS</h2>
        <div id="historyList"></div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const historyList = document.getElementById('historyList');
        const spinBtn = document.getElementById('spinBtn');
        const mensaje = document.getElementById('mensaje');
        const miTelefono = "5493815727447";
        let currentRotation = 0;

        // 🔴 EDITA AQUÍ LOS NÚMEROS QUE NO QUIERES QUE SALGAN
        const prohibidos = [13,21,33]; 

        const sonidoRuleta = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-roulette-spin-1359.mp3');

        window.onload = () => {
            for (let i = 1; i <= 36; i++) {
                const div = document.createElement('div');
                div.className = 'number';
                div.innerText = i;
                div.style.transform = `rotate(${(i - 1) * 10}deg)`;
                div.style.color = i % 2 === 0 ? '#fff' : '#25D366';
                wheel.appendChild(div);
            }
            if (localStorage.getItem('ya_jugo_pro')) bloquearBoton();
            renderizar();
        };

        // 🎲 Solo saca números permitidos
        function numeroValido(){
        let n;
        do { n = Math.floor(Math.random()*36)+1; }
        while (prohibidos.includes(n));
        return n;
        }

        function girar() {
            if (localStorage.getItem('ya_jugo_pro')) return;
            
            sonidoRuleta.load();
            sonidoRuleta.play().catch(e => {});

            spinBtn.disabled = true;
            const extra = Math.floor(Math.random() * 360);
            currentRotation += 1800 + extra;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                sonidoRuleta.pause();
                const angle = (360 - (currentRotation % 360)) % 360;
                let winner = Math.floor(angle / 10) + 1;

                // Si cae en prohibido, cambia automáticamente
                if (prohibidos.includes(winner)) winner = numeroValido();

                // 📢 MENSAJE GANAR / PERDER
                if(winner % 2 === 0){ // Ejemplo: pares = ganas
                    mensaje.textContent = "✅ ¡GANASTE! Número: "+winner;
                    mensaje.style.color="#25D366";
                }else{
                    mensaje.textContent = "❌ PERDISTE. Fue: "+winner;
                    mensaje.style.color="#ff4444";
                }

                guardar(winner);
                localStorage.setItem('ya_jugo_pro', 'true');
                bloquearBoton();
            }, 5000);
        }

        function bloquearBoton() {
            spinBtn.disabled = true;
            spinBtn.innerText = "SÓLO 1 INTENTO";
        }

        function guardar(num) {
            let datos = JSON.parse(localStorage.getItem('ruleta_v5')) || [];
            datos.unshift({ numero: num, hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            localStorage.setItem('ruleta_v5', JSON.stringify(datos));
            renderizar();
        }

        function renderizar() {
            let datos = JSON.parse(localStorage.getItem('ruleta_v5')) || [];
            historyList.innerHTML = '';
            datos.forEach(item => {
                const a = document.createElement('a');
                a.className = 'ws-card';
                a.href = `https://wa.me/${miTelefono}?text=Ganador+PRO:+%23${item.numero}`;
                a.target = "_blank";
                a.innerHTML = `<span>#${item.numero}</span> <span>${item.hora} 📲</span>`;
                historyList.appendChild(a);
            });
        }
    </script>
</body>
</html>
